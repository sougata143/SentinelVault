version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinelvault-db
    environment:
      POSTGRES_DB: sentinelvault
      POSTGRES_USER: sentinel_admin
      POSTGRES_PASSWORD: sentinel_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: sentinelvault-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
