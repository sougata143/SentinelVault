name: SentinelVault CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── FLUTTER FRONTEND & CORE JOB ──────────────────────────────────────────
  flutter-test:
    name: Flutter Core and App Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: flutter doctor -v

      # Analyze & Test Core Package
      - name: Core — Install Dependencies
        run: flutter pub get
        working-directory: core

      - name: Core — Static Analysis
        run: flutter analyze
        working-directory: core

      - name: Core — Run Tests
        run: flutter test
        working-directory: core

      # Analyze & Test App Package
      - name: App — Install Dependencies
        run: flutter pub get
        working-directory: app

      - name: App — Static Analysis
        run: flutter analyze
        working-directory: app

      - name: App — Run Tests
        run: flutter test
        working-directory: app

  # ── NODE.js BACKEND SERVICES JOB ──────────────────────────────────────────
  backend-test:
    name: Node.js Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, security-analysis-service, sync-api]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend/${{ matrix.service }}

      - name: TypeScript Compile Check
        run: npm run build
        working-directory: backend/${{ matrix.service }}

      - name: Run Jest Tests
        run: npm run test
        working-directory: backend/${{ matrix.service }}

  # ── RUST NATIVE CRYPTO CORE JOB ──────────────────────────────────────────
  rust-build-and-test:
    name: Rust Crypto Core - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-ios
            os: macos-latest
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: wasm32-unknown-unknown
            os: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/crypto_core/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('native/crypto_core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      # Android cross-compilation requires the NDK's Clang cross-linker.
      # Without this, Cargo falls back to the host x86_64 `cc` which rejects
      # aarch64 object files with "Relocations in generic ELF (EM: 183)".
      # $ANDROID_NDK_ROOT is pre-installed on ubuntu-latest runners.
      - name: Configure Android NDK Cross-Linker
        if: matrix.target == 'aarch64-linux-android'
        run: |
          NDK_BIN="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          # Verify the NDK is present and report version for debugging
          ls "${NDK_BIN}/aarch64-linux-android21-clang" || \
            (echo "NDK not found at ${ANDROID_NDK_ROOT}" && exit 1)
          # Cargo reads CARGO_TARGET_<TARGET_UPPER>_LINKER to select the linker
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_BIN}/aarch64-linux-android21-clang" >> $GITHUB_ENV
          # CC / AR are used by -sys crates and build.rs scripts
          echo "CC_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${NDK_BIN}/llvm-ar" >> $GITHUB_ENV

      # Host tests run on the native architecture only.
      # Skip them for cross-compile-only targets (Android, iOS) because the
      # compiled binaries cannot execute on the x86_64/aarch64-apple host.
      - name: Run Crate Correctness Tests on Host
        if: matrix.target == 'wasm32-unknown-unknown' || matrix.target == 'aarch64-apple-ios' || matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-ios'
        run: cargo test
        working-directory: native/crypto_core

      - name: Run Crate Correctness Tests on Host (native linux)
        if: matrix.target == 'aarch64-linux-android'
        run: cargo test --target x86_64-unknown-linux-gnu
        working-directory: native/crypto_core

      - name: Cross-compile Crate for Target
        run: |
          if [ "${{ matrix.target }}" = "wasm32-unknown-unknown" ]; then
            cargo build --release --target ${{ matrix.target }} --features wasm
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        working-directory: native/crypto_core
