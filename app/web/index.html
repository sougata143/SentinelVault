<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Crypto core WASM loader.
    Imports the wasm-pack JS glue (generated by native/build_wasm.sh → app/web/pkg/),
    initialises the WASM binary, and re-exports every function onto globalThis so
    the dart:js_interop @JS() external declarations in native_crypto_bridge_web.dart
    can call them by name (e.g. wasmEncryptAesGcm).

    The __cryptoCoreReadyPromise is awaited in main.dart (kIsWeb guard) before
    runApp, ensuring no Dart crypto call is made before the module is ready.
  -->
  <script type="module">
    // __cryptoCoreReadyPromise is resolved/rejected here and read by Dart
    // via a JSPromise binding in native_crypto_bridge_web.dart.
    let _resolve, _reject;
    window.__cryptoCoreReadyPromise = new Promise((res, rej) => {
      _resolve = res;
      _reject = rej;
    });

    try {
      // Import the wasm-pack ES-module glue. The path is relative to index.html.
      const cryptoModule = await import('./pkg/crypto_core.js');

      // init() fetches crypto_core_bg.wasm and compiles it.
      await cryptoModule.default();   // wasm-pack --target web exports init as default

      // Re-export every crypto function onto globalThis so the @JS() bindings
      // in native_crypto_bridge_web.dart (which look up dart.global.*) find them.
      // wasm-bindgen converts wasm_encrypt_aes_gcm → wasmEncryptAesGcm automatically.
      const fns = [
        'wasmDeriveMasterKey',
        'wasmEncryptAesGcm',
        'wasmDecryptAesGcm',
        'wasmSrpCalculateX',
        'wasmSrpCalculateVerifier',
        'wasmSrpGenerateClientEphemeral',
        'wasmSrpCalculateClientSession',
        'wasmShamirSplit',
        'wasmShamirCombine',
      ];
      for (const fn of fns) {
        if (typeof cryptoModule[fn] === 'function') {
          window[fn] = cryptoModule[fn];
        } else {
          console.warn('[SentinelVault] WASM export not found:', fn);
        }
      }

      window.__cryptoCoreReady = true;
      _resolve();
    } catch (err) {
      window.__cryptoCoreReady = false;
      console.error('[SentinelVault] Failed to load WASM crypto module:', err);
      _reject(err);
    }
  </script>

  <!--
    flutter_bootstrap.js is loaded async; Flutter startup waits for the DOM
    to be ready, so the module script above has already started (and usually
    finished) the WASM fetch by the time Dart's main() runs.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
